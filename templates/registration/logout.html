<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logout</title>
  <link rel="stylesheet" href="/static/auth.css">
</head>
<body>
  <main class="auth-card">
    <h1>Logout</h1>
    <p>You are currently signed in.</p>
    <form method="post">
      {% csrf_token %}
      <button type="submit">Sign out</button>
    </form>
  </main>
</body>
</html>
